<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>

    <!-- Accent Gradient 1 -->
    <linearGradient id="accent-grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.8" />
    </linearGradient>

    <!-- Accent Gradient 2 -->
    <linearGradient id="accent-grad-2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.7" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#374151" stroke-width="1" stroke-opacity="0.3" />
    </pattern>
  </defs>

  <style>
    .title {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 800;
      font-size: 52px;
      fill: #ffffff;
    }
    .subtitle {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 500;
      font-size: 20px;
      fill: #9ca3af;
      letter-spacing: 1.5px;
    }
    .tagline {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 400;
      font-size: 16px;
      fill: #f3f4f6;
    }
    .pulsing-dot {
      animation: pulse 3s infinite alternate;
    }
    @keyframes pulse {
      0% { r: 4px; opacity: 0.3; }
      100% { r: 8px; opacity: 0.9; }
    }
  </style>

  <!-- Background Rect -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />

  <!-- Grid Overlay -->
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Glowing Abstract shapes with animations -->
  <circle cx="1000" cy="200" r="180" fill="url(#accent-grad-1)" filter="url(#glow)">
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0,0; 30,-20; -20,30; 0,0" 
      dur="12s" 
      repeatCount="indefinite" />
  </circle>

  <circle cx="200" cy="300" r="140" fill="url(#accent-grad-2)" filter="url(#glow)">
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0,0; -40,10; 20,-30; 0,0" 
      dur="15s" 
      repeatCount="indefinite" />
  </circle>

  <!-- Glowing lines / AI neural network paths -->
  <path d="M-100,200 Q300,100 600,200 T1300,200" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-opacity="0.4" />
  <path d="M-100,250 Q400,350 800,200 T1300,150" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3" />

  <!-- Dynamic floating particles -->
  <circle cx="450" cy="120" r="6" fill="#f43f5e" class="pulsing-dot">
    <animate attributeName="cy" values="120;140;120" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="750" cy="280" r="5" fill="#3b82f6" class="pulsing-dot">
    <animate attributeName="cy" values="280;260;280" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="850" cy="80" r="8" fill="#10b981" class="pulsing-dot">
    <animate attributeName="cx" values="850;870;850" dur="6s" repeatCount="indefinite" />
  </circle>

  <!-- Central Visual Container (representing a phone canvas mockup) -->
  <g transform="translate(480, 50)" filter="url(#glow)">
    <!-- Phone Mockup Frame -->
    <rect x="0" y="0" width="240" height="300" rx="24" fill="#1f2937" stroke="#4b5563" stroke-width="4" />
    <!-- Screen -->
    <rect x="8" y="8" width="224" height="284" rx="16" fill="#111827" />
    <!-- Screen UI Elements -->
    <rect x="24" y="32" width="100" height="12" rx="4" fill="#4b5563" />
    <circle cx="196" cy="38" r="10" fill="#8b5cf6" />
    
    <!-- Visual App Cards representing drag & drop components -->
    <rect x="24" y="64" width="192" height="60" rx="8" fill="#1f2937" stroke="#3b82f6" stroke-width="2">
      <animate attributeName="stroke-opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite" />
    </rect>
    <rect x="36" y="76" width="40" height="36" rx="4" fill="#374151" />
    <rect x="88" y="80" width="100" height="8" rx="2" fill="#9ca3af" />
    <rect x="88" y="94" width="60" height="6" rx="2" fill="#6b7280" />

    <rect x="24" y="136" width="192" height="60" rx="8" fill="#1f2937" stroke="#10b981" stroke-width="1.5" />
    <circle cx="56" cy="166" r="16" fill="#10b981" fill-opacity="0.2" />
    <rect x="88" y="156" width="80" height="8" rx="2" fill="#9ca3af" />
    <rect x="88" y="170" width="40" height="6" rx="2" fill="#6b7280" />
    
    <!-- Build Button -->
    <rect x="24" y="220" width="192" height="40" rx="20" fill="url(#accent-grad-1)" />
    <text x="120" y="245" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">AI GENERATE</text>
  </g>

  <!-- Left Text Content -->
  <g transform="translate(80, 160)">
    <text x="0" y="0" class="subtitle">AWESOME LIST</text>
    <text x="0" y="55" class="title">No-Code AI</text>
    <text x="0" y="110" class="title" fill="#8b5cf6">Mobile App Builders</text>
    <text x="0" y="150" class="tagline">Curated native mobile builders, tools &amp; open-source alternatives.</text>
  </g>
</svg>
